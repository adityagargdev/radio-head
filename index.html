<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="globe-container"></div>

  <div id="ui">
    <header id="header">
      <div class="logo">RADIO<span>GLOBE</span></div>
      <p class="tagline">spin · stop · tune</p>
    </header>

    <div id="ci">
      <div class="ci-ring outer"></div>
      <div class="ci-ring inner"></div>
      <div class="ci-dot"></div>
    </div>

    <div id="bottom">
      <div id="player" class="hidden">
        <div class="player-header">
          <div id="location">
            <span id="flag">🌍</span>
            <span id="country">Loading...</span>
          </div>
          <button id="close-btn">✕</button>
        </div>

        <div id="track-row">
          <img id="album-art" src="" alt="" />
          <div id="track-info">
            <div id="track-name">Loading charts...</div>
            <div id="artist-name"></div>
            <div id="preview-badge">● 30s preview</div>
          </div>
        </div>

        <div id="progress-wrap">
          <div id="progress-bar"></div>
        </div>

        <div id="controls">
          <button class="ctrl" id="prev">⏮</button>
          <button class="ctrl main" id="playpause">⏸</button>
          <button class="ctrl" id="next">⏭</button>
        </div>
        <div id="count"></div>
      </div>

      <div id="actions">
        <button class="btn" id="spin-btn">⟳ SPIN</button>
        <button class="btn primary" id="tune-btn">🎵 TUNE IN</button>
      </div>
    </div>
  </div>

  <!-- Spotify login overlay — shown until authenticated -->
  <div id="login-overlay">
    <div id="login-card">
      <div class="login-logo">RADIO<span>GLOBE</span></div>
      <p class="login-sub">Powered by Spotify</p>
      <p class="login-desc">Spin the globe and hear what's topping the charts in any country this week.</p>
      <button id="spotify-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Connect with Spotify
      </button>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

  <script src="https://unpkg.com/globe.gl"></script>
  <script src="app.js"></script>
</body>
</html>
